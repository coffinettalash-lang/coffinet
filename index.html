<!DOCTYPE html>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
@import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700&display=swap');

body {
    margin:0; padding:20px;
    font-family: 'Vazirmatn', Tahoma, sans-serif;
    background: linear-gradient(135deg, #0f766e, #2563eb);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}
.card {
    width: 100%;
    max-width: 420px;
    background: white;
    border-radius: 24px;
    padding: 30px 25px;
    text-align: center;
    box-shadow: 0 15px 40px rgba(0,0,0,0.25);
}
h1 { color: #0f766e; margin: 0 0 10px 0; font-size: 28px; }
p { color: #555; margin-bottom: 25px; }

.btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    text-decoration: none;
    color: white;
    padding: 16px;
    margin: 10px 0;
    border-radius: 16px;
    font-size: 17px;
    font-weight: bold;
    transition: all 0.3s;
}
.btn:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.2); }

.whatsapp { background: #25D366; }
.telegram { background: #229ED9; }
.rubika { background: #E11D48; }
.eitaa { background: #F59E0B; }
.shad { background: #16A34A; }
.bale { background: #2563EB; }

.save-contact {
    background: #22c55e;
    color: white;
    padding: 16px;
    border-radius: 16px;
    text-decoration: none;
    display: block;
    margin: 20px 0;
    font-weight: bold;
    font-size: 17px;
}
</style>
</head>

    <a href="https://t.me/Cofinet_talash" target="_blank" class="btn telegram">
